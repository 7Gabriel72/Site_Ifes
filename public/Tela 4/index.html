<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela 4 - Seguro Veiculo</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="screen">
      <nav class="main-nav" aria-label="Navegacao de telas">
        <a class="nav-link" href="../Tela 1/Index.html">Tela 1</a>
        <a class="nav-link" href="../Tela2/index.html">Tela 2</a>
        <a class="nav-link" href="../Tela 3/index.html">Tela 3</a>
        <a class="nav-link is-active" aria-current="page" href="./index.html">Tela 4</a>
      </nav>

      <header class="topbar">
        <h1>Seguro de Veiculos</h1>
        <p class="subtitle">Compare coberturas, seguradoras e preco mensal.</p>

        <div class="search-row">
          <label class="sr-only" for="insuranceSearch">Buscar seguro</label>
          <input
            id="insuranceSearch"
            type="text"
            placeholder="Buscar por protecao ou seguradora"
            autocomplete="off"
          />
          <button id="sortBtn" type="button">ORDENAR PRECO</button>
          <button id="clearBtn" class="ghost-btn" type="button">LIMPAR</button>
        </div>

        <p id="insuranceMeta" class="insurance-meta" aria-live="polite"></p>
      </header>

      <section class="card">
        <h2>Planos de Seguro</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Protecoes</th>
                <th>Preco do Seguro</th>
                <th>Seguradora</th>
              </tr>
            </thead>
            <tbody id="insuranceBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
