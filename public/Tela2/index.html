<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela 2 - Catalogo</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="screen">
      <nav class="main-nav" aria-label="Navegacao de telas">
        <a class="nav-link" href="../Tela 1/Index.html">Tela 1</a>
        <a class="nav-link is-active" aria-current="page" href="./index.html">Tela 2</a>
        <a class="nav-link" href="../Tela 3/index.html">Tela 3</a>
        <a class="nav-link" href="../Tela 4/index.html">Tela 4</a>
      </nav>

      <header class="topbar">
        <h1 id="clientName">Lucas Almeida</h1>
        <p id="clientEmail" class="client-email">Email: lucasalmeida@gmail.com</p>

        <div class="search-row">
          <label class="sr-only" for="catalogSearch">Buscar no catalogo</label>
          <input
            id="catalogSearch"
            type="text"
            placeholder="Buscar por modelo, marca ou especificacao"
            autocomplete="off"
          />
          <button id="sortPriceBtn" type="button">ORDENAR PRECO</button>
          <button id="clearCatalogBtn" class="ghost-btn" type="button">LIMPAR</button>
        </div>

        <p id="catalogMeta" class="catalog-meta" aria-live="polite"></p>
      </header>

      <section class="card">
        <h2>Catalogo de Veiculos</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Foto</th>
                <th>Preco</th>
                <th>Especificacoes</th>
              </tr>
            </thead>
            <tbody id="catalogBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
