<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Matrículas</title><link rel="stylesheet" href="css/style.css"></head>
<body>
<header class="topo"><h1>Matrículas</h1><p>Cadastrar, buscar, editar e deletar matrículas</p></header>

  <!-- Menu de navegação entre as páginas do sistema. -->
  <nav class="menu">
    <a href="index.html">Início</a>
    <a href="alunos.html">Alunos</a>
    <a href="cursos.html">Cursos</a>
    <a href="turmas.html">Turmas</a>
    <a href="matriculas.html">Matrículas</a>
    <a href="testes-api.html">Testes da API</a>
  </nav>

<main class="container">
<section class="card"><h2 id="tituloFormulario">Cadastrar matrícula</h2><form id="formMatricula" class="formulario"><input id="matriculaId" type="hidden"><label>Aluno</label><select id="aluno_id" required></select><label>Turma</label><select id="turma_id" required></select><button type="submit">Salvar matrícula</button><button type="button" onclick="limparFormulario()">Cancelar edição</button></form><p id="mensagem" class="mensagem"></p></section>
<section class="card"><h2>Buscar matrícula</h2><div class="formulario-dupla"><input id="busca" placeholder="Digite aluno, turma ou curso"><button onclick="carregarMatriculas()">Buscar</button></div></section>
<section class="card"><h2>Lista de matrículas</h2><div id="listaMatriculas" class="resultado"></div></section>
</main>
<footer class="rodape"><p>Projeto didático - Secretaria Escolar</p></footer>
<script src="js/api.js"></script>
<script>
// Seleciona o formulário de matrículas.
const formMatricula = document.getElementById("formMatricula");

// Carrega alunos no select.
async function carregarAlunosSelect() {
  const select = document.getElementById("aluno_id");
  const alunos = await buscarJSON("/alunos");
  select.innerHTML = '<option value="">Selecione um aluno</option>';
  alunos.forEach((aluno) => {
    const option = document.createElement("option");
    option.value = aluno.id;
    option.textContent = `${aluno.nome} (${aluno.email})`;
    select.appendChild(option);
  });
}

// Carrega turmas no select.
async function carregarTurmasSelect() {
  const select = document.getElementById("turma_id");
  const turmas = await buscarJSON("/turmas");
  select.innerHTML = '<option value="">Selecione uma turma</option>';
  turmas.forEach((turma) => {
    const option = document.createElement("option");
    option.value = turma.id;
    option.textContent = `${turma.curso} - ${turma.semestre} ${turma.letra}`;
    select.appendChild(option);
  });
}

// Envia dados do formulário para cadastrar ou editar matrícula.
formMatricula.addEventListener("submit", async (evento) => {
  evento.preventDefault();
  const id = document.getElementById("matriculaId").value;
  const aluno_id = Number(document.getElementById("aluno_id").value);
  const turma_id = Number(document.getElementById("turma_id").value);
  const editando = Boolean(id);
  const url = editando ? `/matriculas-turma/${id}` : "/matriculas-turma";
  const method = editando ? "PUT" : "POST";
  try {
    await buscarJSON(url, { method, headers: { "Content-Type": "application/json" }, body: JSON.stringify({ aluno_id, turma_id }) });
    mostrarMensagem("mensagem", editando ? "Matrícula editada com sucesso!" : "Matrícula cadastrada com sucesso!", "sucesso");
    limparFormulario();
    carregarMatriculas();
  } catch (erro) {
    mostrarMensagem("mensagem", erro.message, "erro");
  }
});

// Preenche formulário para editar matrícula.
function editarMatricula(id, aluno_id, turma_id) {
  document.getElementById("matriculaId").value = id;
  document.getElementById("aluno_id").value = aluno_id;
  document.getElementById("turma_id").value = turma_id;
  document.getElementById("tituloFormulario").textContent = "Editar matrícula";
}

// Limpa formulário.
function limparFormulario() {
  formMatricula.reset();
  document.getElementById("matriculaId").value = "";
  document.getElementById("tituloFormulario").textContent = "Cadastrar matrícula";
}

// Deleta matrícula.
async function deletarMatricula(id) {
  if (!confirm("Deseja realmente deletar esta matrícula?")) return;
  try {
    const resposta = await fetch(`/matriculas-turma/${id}`, { method: "DELETE" });
    if (!resposta.ok) {
      const dados = await resposta.json();
      throw new Error(dados.erro);
    }
    mostrarMensagem("mensagem", "Matrícula deletada com sucesso!", "sucesso");
    carregarMatriculas();
  } catch (erro) {
    mostrarMensagem("mensagem", erro.message, "erro");
  }
}

// Carrega matrículas na tela.
async function carregarMatriculas() {
  const busca = document.getElementById("busca").value;
  const url = busca ? "/matriculas-turma?q=" + encodeURIComponent(busca) : "/matriculas-turma";
  const lista = document.getElementById("listaMatriculas");
  try {
    const matriculas = await buscarJSON(url);
    lista.innerHTML = "";
    matriculas.forEach((matricula) => {
      const item = document.createElement("div");
      item.className = "item";
      item.innerHTML = `<strong>${matricula.aluno}</strong><br><span>Turma: ${matricula.turma}</span><br><span>Curso: ${matricula.curso}</span><br><small>ID: ${matricula.id}</small><div class="item-acoes"><button class="botao-editar" onclick="editarMatricula(${matricula.id}, ${matricula.aluno_id}, ${matricula.turma_id})">Editar</button><button class="botao-deletar" onclick="deletarMatricula(${matricula.id})">Deletar</button></div>`;
      lista.appendChild(item);
    });
  } catch (erro) {
    lista.innerHTML = `<p class="erro">${erro.message}</p>`;
  }
}

// Inicia os dados da tela.
carregarAlunosSelect();
carregarTurmasSelect();
carregarMatriculas();
</script>
</body>
</html>
