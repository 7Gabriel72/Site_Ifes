<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela 1 - Buscar por carro</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="screen">
      <nav class="main-nav" aria-label="Navegacao de telas">
        <a class="nav-link is-active" aria-current="page" href="./Index.html">Tela 1</a>
        <a class="nav-link" href="../Tela2/index.html">Tela 2</a>
        <a class="nav-link" href="../Tela 3/index.html">Tela 3</a>
        <a class="nav-link" href="../Tela 4/index.html">Tela 4</a>
      </nav>

      <header class="topbar">
        <h1>Buscar por carro</h1>
        <p class="subtitle">Consulte por nome, placa ou status do pagamento.</p>

        <div class="search-row">
          <label class="sr-only" for="searchInput">Buscar carro</label>
          <input
            id="searchInput"
            type="text"
            placeholder="Digite nome, placa ou status"
            autocomplete="off"
          />
          <button id="searchBtn" type="button">PESQUISAR</button>
          <button id="clearBtn" class="ghost-btn" type="button">LIMPAR</button>
        </div>

        <p id="resultCount" class="result-count" aria-live="polite"></p>
      </header>

      <section class="card">
        <h2>AutoPrime Veiculos</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome do Carro</th>
                <th>Placa do carro</th>
                <th>Data da compra</th>
                <th>Status do Pagamento</th>
              </tr>
            </thead>
            <tbody id="carsTable"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
